name: Update recent posts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "data/feedly.opml"
      - "data/overrides.json"
      - "requirements.txt"
      - ".github/workflows/update-recent-posts.yml"
  schedule:
    - cron: "17 7,19 * * *"
      timezone: "Europe/London"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: blaugust-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install feed reader
        run: pip install -r requirements.txt

      - name: Check feeds and build files
        run: python scripts/build_recent_posts.py

      - name: Save the latest cache and output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feed-cache.json docs/latest-posts.json docs/latest-posts-data.js
          if ! git diff --cached --quiet; then
            git commit -m "Update recent Blaugust posts"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages files
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
